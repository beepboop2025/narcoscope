name: data refresh

# Quarterly pull of the automatable open-data sources (UNODC WDR annexes,
# World Bank GDP). Opens a PR only when the regenerated datasets differ, so
# every data change lands as a reviewable diff, never a silent mutation.
on:
  schedule:
    - cron: '0 6 1 1,4,7,10 *' # 06:00 UTC on the 1st of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data pipeline (fetch + transform + validate)
        run: node scripts/pipeline/run.mjs

      - name: Open PR if datasets changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: src/data
          branch: data-refresh/automated
          commit-message: 'data: quarterly open-source refresh (UNODC annexes + World Bank GDP)'
          title: 'Automated data refresh'
          body: |
            Regenerated by `scripts/pipeline/run.mjs` from the sources in
            `scripts/pipeline/sources.json`. Review the diff for anomalies
            (the dataset-integrity tests already passed in this run).
          delete-branch: true
